<!DOCTYPE html>
<html>
<head>
    <title>Edit Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Edit Weighing Record</h2>

<form method="POST">

    <label>Vehicle:</label>
    <input name="vehicle" value="{{ record.vehicle }}" required>

    <label>Material:</label>
    <input name="material" value="{{ record.material }}" required>

    <label>Supplier:</label>
    <input name="supplier" value="{{ record.supplier }}" required>

    <label>Driver:</label>
    <input name="driver" value="{{ record.driver }}" required>

    <label>Gross:</label>
    <input name="gross" type="number" step="0.01" value="{{ record.gross }}" required>

    <label>Tare:</label>
    <input name="tare" type="number" step="0.01" value="{{ record.tare }}" required>

    <label>Net:</label>
    <input name="net" type="number" step="0.01" value="{{ record.net }}" required>

    <label>Date:</label>
    <input name="date_time" type="text" value="{{ record.date_time }}" required>

    <br><br>

    <button type="submit">Update Record</button>

</form>

<br>
<a href="{{ url_for('weighbridge_bp.records') }}">Back</a>

</body>
</html>
