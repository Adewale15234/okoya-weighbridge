<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Record</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    width: 450px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

input[readonly] {
    background-color: #e9ecef;
    cursor: not-allowed;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.back-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #007bff;
}

.back-link:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">

<h2>Edit Weighing Record</h2>

<form method="POST">

    <label>Vehicle:</label>
    <input name="vehicle" value="{{ record.vehicle }}" required>

    <label>Material:</label>
    <input name="material" value="{{ record.material }}" required>

    <label>Supplier:</label>
    <input name="supplier" value="{{ record.supplier }}" required>

    <label>Driver:</label>
    <input name="driver" value="{{ record.driver }}" required>

    <label>Gross:</label>
    <input id="gross" name="gross" type="number" step="0.01" value="{{ record.gross }}" required>

    <label>Tare:</label>
    <input id="tare" name="tare" type="number" step="0.01" value="{{ record.tare }}" required>

    <label>Net (Auto Calculated):</label>
    <input id="net" name="net" type="number" step="0.01" value="{{ record.net }}" readonly>

    <label>Date & Time:</label>
<input name="date_time" type="datetime-local"
    value="{{ record.date_time.strftime('%Y-%m-%dT%H:%M') if record.date_time else '' }}" required>

    <button type="submit">Update Record</button>

</form>

<a class="back-link" href="{{ url_for('weighbridge_bp.records') }}">← Back to Records</a>

</div>

<script>
function calculateNet() {
    let gross = parseFloat(document.getElementById('gross').value) || 0;
    let tare = parseFloat(document.getElementById('tare').value) || 0;
    let net = gross - tare;

    document.getElementById('net').value = net.toFixed(2);
}

// Run when user types
document.getElementById('gross').addEventListener('input', calculateNet);
document.getElementById('tare').addEventListener('input', calculateNet);

// Run once on page load
window.onload = calculateNet;
</script>

</body>
</html>
